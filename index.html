<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta -->
  <title>Superpower Coaching | Deferred MBA Consulting</title>
  <meta name="description" content="Since 2020, Lisa has helped 30+ candidates gain admission to HBS, Stanford GSB, Wharton, and beyond." />
  <meta property="og:title" content="Superpower Coaching | Deferred MBA Consulting" />
  <meta property="og:description" content="Since 2020, Lisa has helped 30+ candidates gain admission to HBS, Stanford GSB, Wharton, and beyond." />
  <meta property="og:type" content="website" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* === RESET === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* === DESIGN TOKENS === */
    :root {
      --paper: #FAFAF8;
      --ink: #1A1A1A;
      --pencil: #4A4A4A;
      --fade: #8A8A8A;
      --kraft: #C4A77D;
      --border: #D4CFC8;
      --ff-display: 'Playfair Display', Georgia, serif;
      --ff-body: 'Inter', system-ui, sans-serif;
      --max-w: 1100px;
      --section-pad: 96px 48px;
    }

    /* === BASE === */
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--ff-body);
      font-size: 16px;
      line-height: 1.6;
      color: var(--pencil);
      background-color: var(--paper);
      min-height: 100vh;
    }

    /* Paper texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* === TYPOGRAPHY === */
    h1, h2, h3, h4 {
      font-family: var(--ff-display);
      color: var(--ink);
      line-height: 1.2;
    }
    h1 { font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 700; }
    h2 { font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 600; }
    h3 { font-size: 1.3rem; font-weight: 600; }
    p { color: var(--pencil); line-height: 1.7; }
    a { color: inherit; text-decoration: none; }

    /* === LAYOUT HELPERS === */
    .container { max-width: var(--max-w); margin: 0 auto; }
    section { padding: var(--section-pad); }

    /* === SECTION LABEL === */
    .section-label {
      font-family: var(--ff-body);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--fade);
      margin-bottom: 16px;
    }

    /* === NAV === */
    .nav {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 48px;
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    .nav-logo {
      font-family: var(--ff-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      font-size: 0.82rem;
      color: var(--pencil);
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .nav-links a:hover { color: var(--ink); }

    /* === HERO === */
    .hero {
      padding: 80px 48px 96px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 64px;
      align-items: center;
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .hero-eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--kraft);
      margin-bottom: 20px;
      font-weight: 500;
    }
    .hero h1 {
      margin-bottom: 8px;
    }
    .hero-underline {
      margin: 12px 0 28px;
      display: block;
    }
    .hero-sub {
      font-size: 1.05rem;
      color: var(--pencil);
      max-width: 480px;
      margin-bottom: 36px;
      line-height: 1.75;
    }
    .hero-cta {
      display: inline-block;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink);
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 2px;
      cursor: pointer;
    }
    .hero-cta:hover { color: var(--kraft); border-color: var(--kraft); }
    .hero-photo-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .hero-photo {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 2px solid var(--border);
      filter: grayscale(15%);
    }
    .hero-photo-placeholder {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--fade);
      text-align: center;
      border: 2px dashed var(--fade);
    }
  </style>
</head>
<body>

  <!-- ✦ NAV ✦ -->
  <nav class="nav">
    <a href="#" class="nav-logo">Superpower Coaching</a>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#process">Process</a></li>
      <li><a href="#packages">Packages</a></li>
      <li><a href="#team">Team</a></li>
    </ul>
  </nav>

  <!-- ✦ HERO ✦ -->
  <section class="hero" id="about">
    <div class="hero-text">
      <p class="hero-eyebrow">Deferred MBA · 2026–2027</p>
      <h1>Find your voice.<br>Unleash your superpower.<br>Own your story.</h1>
      <svg class="hero-underline" width="340" height="14" viewBox="0 0 340 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 10 C 40 4, 80 13, 120 7 S 180 3, 220 9 S 280 13, 338 6" stroke="#C4A77D" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      </svg>
      <p class="hero-sub">Since 2020, Lisa has helped 30+ candidates gain admission to HBS, Stanford GSB, Wharton, and beyond.</p>
      <a href="#packages" class="hero-cta">See Packages ↓</a>
    </div>
    <div class="hero-photo-wrap">
      <img
        src="lisa-headshot.jpeg"
        alt="Lisa Qiya Li, founder of Superpower Coaching"
        class="hero-photo"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      />
      <div class="hero-photo-placeholder" style="display:none;">
        Photo<br>Coming Soon
      </div>
    </div>
  </section>
